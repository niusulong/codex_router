# Codex Router 配置文件

upstream:
  # 上游 API 基础地址（Chat Completions 兼容服务）
  base_url: "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
  # 上游 API Key
  api_key: "4a7ec587018ca4c890009b51eb0e69b2:YzczYzcwNGM1ZGVhNTdkOWQzZGJjODUw"
  # 请求超时（秒）
  timeout: 120

server:
  # 代理监听地址
  host: "127.0.0.1"
  # 代理监听端口
  port: 8080
  log_level: "info"

# 模型名称覆盖（可选）：将请求中的模型名替换为此值
model_override: "astron-code-latest"

# 是否将客户端的 API Key 透传给上游（当 upstream.api_key 为空时生效）
passthrough_api_key: false

# 需要过滤的 Responses API 内置工具类型
ignored_builtin_tools:
  - web_search_preview
  - web_search
  - file_search
  - code_interpreter
  - mcp

# Codex CLI 配置管理
codex:
  # 是否在启动时自动配置 Codex CLI（修改 ~/.codex/auth.json）
  auto_configure: true
  # Codex 配置目录（默认 ~/.codex）
  config_dir: null
